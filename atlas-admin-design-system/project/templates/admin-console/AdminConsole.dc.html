<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Admin Console" description="中后台 shell — collapsible sidebar, header, breadcrumb, and a sortable data table page" -->
<helmet>
<script src="./ds-base.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
</helmet>
<div style="display:flex; min-height:100vh; background:var(--background); font-family:var(--font-sans); color:var(--foreground)">

  <!-- Sidebar -->
  <aside style="width:248px; flex-shrink:0; background:var(--sidebar); border-right:1px solid var(--sidebar-border); display:flex; flex-direction:column; position:sticky; top:0; height:100vh">
    <div style="height:56px; display:flex; align-items:center; gap:9px; padding:0 16px; border-bottom:1px solid var(--sidebar-border); flex-shrink:0">
      <div style="width:28px; height:28px; border-radius:7px; background:var(--primary); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:13px">A</div>
      <span style="font-size:15px; font-weight:700; letter-spacing:-0.01em">Atlas Admin</span>
    </div>
    <div style="flex:1; overflow-y:auto">
      <x-import component-from-global-scope="AtlasAdminDesignSystem_9d1c70.SidebarNav" groups="{{ navGroups }}" active="{{ activeKey }}" on-navigate="{{ onNavigate }}" hint-size="248px,420px"></x-import>
    </div>
    <div style="border-top:1px solid var(--sidebar-border); padding:10px 12px; display:flex; align-items:center; gap:9px">
      <x-import component-from-global-scope="AtlasAdminDesignSystem_9d1c70.Avatar" name="张伟" size="sm" hint-size="32px,32px"></x-import>
      <div style="flex:1; min-width:0; line-height:1.2">
        <div style="font-size:13px; font-weight:500">张伟</div>
        <div style="font-size:11px; color:var(--muted-foreground)">系统管理员</div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div style="flex:1; min-width:0; display:flex; flex-direction:column">
    <header style="height:56px; flex-shrink:0; display:flex; align-items:center; justify-content:space-between; gap:16px; padding:0 20px; background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:30">
      <x-import component-from-global-scope="AtlasAdminDesignSystem_9d1c70.Breadcrumb" items="{{ crumbs }}" hint-size="240px,20px"></x-import>
      <div style="width:220px">
        <x-import component-from-global-scope="AtlasAdminDesignSystem_9d1c70.Input" size="sm" placeholder="全局搜索…" hint-size="220px,30px"></x-import>
      </div>
    </header>

    <main style="flex:1; padding:20px; overflow-y:auto">
      <h1 style="margin:0 0 16px; font-size:24px; font-weight:700; letter-spacing:-0.01em">用户管理</h1>

      <!-- Toolbar -->
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:14px">
        <div style="width:200px">
          <x-import component-from-global-scope="AtlasAdminDesignSystem_9d1c70.Input" size="sm" placeholder="搜索姓名/账号" hint-size="200px,30px"></x-import>
        </div>
        <x-import component-from-global-scope="AtlasAdminDesignSystem_9d1c70.Button" size="sm" hint-size="96px,30px">新增用户</x-import>
      </div>

      <!-- Table card -->
      <x-import component-from-global-scope="AtlasAdminDesignSystem_9d1c70.Card" hint-size="100%,320px">
        <x-import component-from-global-scope="AtlasAdminDesignSystem_9d1c70.DataTable" columns="{{ columns }}" data="{{ users }}" row-key="id" zebra="{{ true }}" sort-key="{{ sortKey }}" sort-dir="{{ sortDir }}" on-sort="{{ onSort }}" hint-size="100%,300px"></x-import>
        <div style="padding:10px 14px; border-top:1px solid var(--border)">
          <x-import component-from-global-scope="AtlasAdminDesignSystem_9d1c70.Pagination" page="{{ 1 }}" page-size="{{ 10 }}" total="{{ 128 }}" hint-size="100%,32px"></x-import>
        </div>
      </x-import>
    </main>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { activeKey: 'users', sortKey: 'name', sortDir: 'asc' };

  renderVals() {
    const NS = window.AtlasAdminDesignSystem_9d1c70 || {};
    const React = window.React;
    const el = React ? React.createElement : () => null;

    const navGroups = [
      { title: '总览', items: [{ key: 'dash', title: '仪表盘', url: '#' }] },
      { title: '系统管理', items: [
        { key: 'perm', title: '权限管理', defaultOpen: true, items: [
          { key: 'users', title: '用户管理', url: '#', badge: 128 },
          { key: 'roles', title: '角色管理', url: '#' },
          { key: 'menus', title: '菜单管理', url: '#' },
        ]},
        { key: 'basic', title: '基础数据', items: [
          { key: 'dict', title: '字典管理', url: '#' },
        ]},
      ]},
      { title: '监控', items: [{ key: 'logs', title: '日志管理', url: '#' }] },
    ];

    const users = [
      { id: 1, name: '张伟', username: 'zhangwei', dept: '技术部', role: '系统管理员', roleTone: 'primary', status: true, last: '2026-06-30 09:12' },
      { id: 2, name: '李娜', username: 'lina', dept: '风控部', role: '审计员', roleTone: 'info', status: true, last: '2026-06-30 08:47' },
      { id: 3, name: '王强', username: 'wangqiang', dept: '运营部', role: '运营', roleTone: 'success', status: false, last: '2026-06-12 17:20' },
      { id: 4, name: '刘洋', username: 'liuyang', dept: '技术部', role: '开发', roleTone: 'neutral', status: true, last: '2026-06-29 22:03' },
      { id: 5, name: '陈静', username: 'chenjing', dept: '财务部', role: '财务', roleTone: 'warning', status: true, last: '2026-06-28 11:33' },
    ];

    const columns = [
      { key: 'name', header: '用户', sortable: true, render: (r) => el('div', { style: { display: 'flex', alignItems: 'center', gap: '9px' } },
          NS.Avatar ? el(NS.Avatar, { name: r.name, size: 'sm' }) : null,
          el('div', { style: { lineHeight: 1.2 } },
            el('div', { style: { fontWeight: 500 } }, r.name),
            el('div', { style: { fontFamily: 'var(--font-mono)', fontSize: 'var(--text-2xs)', color: 'var(--muted-foreground)' } }, r.username))) },
      { key: 'dept', header: '部门', render: (r) => el('span', { style: { color: 'var(--muted-foreground)' } }, r.dept) },
      { key: 'role', header: '角色', render: (r) => NS.Tag ? el(NS.Tag, { tone: r.roleTone }, r.role) : r.role },
      { key: 'status', header: '状态', render: (r) => NS.Badge ? el(NS.Badge, { tone: r.status ? 'success' : 'neutral', dot: true }, r.status ? '启用' : '停用') : null },
      { key: 'last', header: '最近登录', sortable: true, render: (r) => el('span', { style: { fontFamily: 'var(--font-mono)', fontSize: 'var(--text-xs)', color: 'var(--muted-foreground)' } }, r.last) },
    ];

    const dir = this.state.sortDir === 'asc' ? 1 : -1;
    const sorted = [...users].sort((a, b) => a[this.state.sortKey] > b[this.state.sortKey] ? dir : a[this.state.sortKey] < b[this.state.sortKey] ? -dir : 0);

    return {
      navGroups, users: sorted, columns,
      activeKey: this.state.activeKey,
      sortKey: this.state.sortKey, sortDir: this.state.sortDir,
      crumbs: [{ label: '系统管理', href: '#' }, { label: '用户管理' }],
      onNavigate: (k) => this.setState({ activeKey: k }),
      onSort: (k, d) => this.setState({ sortKey: k, sortDir: d }),
    };
  }
}
</script>
</body>
</html>
