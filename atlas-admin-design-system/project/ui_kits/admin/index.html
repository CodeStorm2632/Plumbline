<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas Admin — 管理控制台</title>
  <link rel="stylesheet" href="../../styles.css" />
  <script src="../../_ds_bundle.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>html,body{margin:0;background:var(--background)}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="LoginScreen.jsx"></script>
  <script type="text/babel" src="UsersScreen.jsx"></script>
  <script type="text/babel" src="RolesScreen.jsx"></script>
  <script type="text/babel" src="LogsScreen.jsx"></script>
  <script type="text/babel" src="MiscScreens.jsx"></script>
  <script type="text/babel" src="AppShell.jsx"></script>
  <script type="text/babel">
    function App() {
      const [authed, setAuthed] = React.useState(false);
      return authed
        ? <window.AppShell onLogout={() => setAuthed(false)} />
        : <window.LoginScreen onLogin={() => setAuthed(true)} />;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
