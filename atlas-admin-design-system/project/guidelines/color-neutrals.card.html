<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals & Surfaces" subtitle="Slate surfaces, borders, and text hierarchy" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:16px;background:var(--background);font-family:var(--font-sans)}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .sw{flex:1;min-width:96px;border-radius:var(--radius-md);border:1px solid var(--border);overflow:hidden;background:var(--card)}
  .chip{height:54px}
  .meta{padding:6px 8px}
  .name{font-size:var(--text-xs);font-weight:600;color:var(--foreground)}
  .val{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--muted-foreground);margin-top:2px}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--background)"></div><div class="meta"><div class="name">background</div><div class="val">画布</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--card);border-bottom:1px solid var(--border)"></div><div class="meta"><div class="name">card</div><div class="val">卡片面</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--muted)"></div><div class="meta"><div class="name">muted</div><div class="val">表头/斑马</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--border)"></div><div class="meta"><div class="name">border</div><div class="val">分隔线</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--foreground)"></div><div class="meta"><div class="name">foreground</div><div class="val">主文本</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--muted-foreground)"></div><div class="meta"><div class="name">muted-fg</div><div class="val">次文本</div></div></div>
  </div>
</body></html>
