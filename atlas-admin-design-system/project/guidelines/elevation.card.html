<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Soft, low-spread shadows — cards, popovers, overlays" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:22px;background:var(--background);font-family:var(--font-sans)}
  .row{display:flex;gap:22px;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:96px;height:56px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg)}
  .name{font-size:var(--text-xs);font-weight:600;color:var(--foreground)}
  .val{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--muted-foreground)}
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="name">xs · 控件</div><div class="val">--shadow-xs</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="name">sm · 卡片</div><div class="val">--shadow-sm</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="name">md · 悬浮</div><div class="val">--shadow-md</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-popover)"></div><div class="name">popover · 弹层</div><div class="val">--shadow-popover</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="name">lg · 抽屉/弹窗</div><div class="val">--shadow-lg</div></div>
  </div>
</body></html>
