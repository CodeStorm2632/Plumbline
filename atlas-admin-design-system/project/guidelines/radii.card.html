<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Small, rational corners — 3 to 8px" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:18px;background:var(--card);font-family:var(--font-sans)}
  .row{display:flex;gap:16px;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{width:64px;height:52px;background:var(--primary-muted);border:1.5px solid var(--primary)}
  .name{font-size:var(--text-xs);font-weight:600;color:var(--foreground)}
  .val{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--muted-foreground)}
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="name">xs</div><div class="val">3px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="name">sm</div><div class="val">4px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><div class="name">md · 按钮/输入</div><div class="val">6px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="name">lg · 卡片</div><div class="val">6px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="name">xl · 抽屉</div><div class="val">8px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-full);width:52px"></div><div class="name">full · 标签</div><div class="val">9999px</div></div>
  </div>
</body></html>
