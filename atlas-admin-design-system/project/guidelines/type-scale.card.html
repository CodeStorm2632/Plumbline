<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="Compact scale tuned for dense tables & forms" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:18px;background:var(--card);font-family:var(--font-sans);color:var(--foreground)}
  .r{display:flex;align-items:baseline;gap:14px;padding:5px 0}
  .t{flex:1}
  .m{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--muted-foreground);white-space:nowrap}
</style></head>
<body>
  <div class="r"><div class="t" style="font-size:var(--text-2xl);font-weight:700;letter-spacing:-0.01em">页面标题 Page Title</div><div class="m">2xl · 24 / 700</div></div>
  <div class="r"><div class="t" style="font-size:var(--text-xl);font-weight:600">区块标题 Section</div><div class="m">xl · 20 / 600</div></div>
  <div class="r"><div class="t" style="font-size:var(--text-lg);font-weight:600">卡片标题 Card</div><div class="m">lg · 17 / 600</div></div>
  <div class="r"><div class="t" style="font-size:var(--text-base)">界面正文 Body — 默认交互文本</div><div class="m">base · 14 / 400</div></div>
  <div class="r"><div class="t" style="font-size:var(--text-sm)">表格单元格 / 表单标签 Dense</div><div class="m">sm · 13 / 400</div></div>
  <div class="r"><div class="t" style="font-size:var(--text-xs);color:var(--muted-foreground)">标签 / 说明 / 时间戳 Caption</div><div class="m">xs · 12</div></div>
  <div class="r"><div class="t" style="font-size:var(--text-2xs);color:var(--muted-foreground);letter-spacing:var(--tracking-caps);text-transform:uppercase;font-weight:600">EYEBROW / 分组标签</div><div class="m">2xs · 11 caps</div></div>
</body></html>
