<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:16px;background:var(--card);font-family:var(--font-sans)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .sw{flex:1;min-width:110px;border-radius:var(--radius-md);border:1px solid var(--border);overflow:hidden}
  .chip{height:60px}
  .meta{padding:7px 9px}
  .name{font-size:var(--text-xs);font-weight:600;color:var(--foreground)}
  .val{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--muted-foreground);margin-top:2px}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--primary)"></div><div class="meta"><div class="name">primary</div><div class="val">--primary</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--primary-hover)"></div><div class="meta"><div class="name">primary-hover</div><div class="val">--primary-hover</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--primary-muted)"></div><div class="meta"><div class="name">primary-muted · 选中态</div><div class="val">--primary-muted</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--primary);display:flex;align-items:center;justify-content:center;color:var(--primary-foreground);font-size:var(--text-sm);font-weight:600">Aa 前景</div><div class="meta"><div class="name">primary-foreground</div><div class="val">--primary-foreground</div></div></div>
  </div>
</body></html>
