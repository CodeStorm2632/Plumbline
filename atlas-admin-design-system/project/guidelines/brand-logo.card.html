<!-- @dsCard group="Brand" viewport="700x180" name="Logo" subtitle="Layered-panel mark + Atlas Admin wordmark, on light & dark" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:18px;background:var(--card);font-family:var(--font-sans);display:flex;gap:16px}
  .tile{flex:1;border-radius:var(--radius-lg);border:1px solid var(--border);padding:22px;display:flex;align-items:center;gap:18px}
  .light{background:var(--background)}
  .dark-tile{background:oklch(0.169 0.02 264)}
  .cap{font-size:var(--text-2xs);color:var(--muted-foreground);margin-top:10px;font-family:var(--font-mono)}
</style></head>
<body>
  <div style="flex:1">
    <div class="tile light">
      <img src="../assets/logo-mark.svg" width="40" height="40" alt="mark" />
      <img src="../assets/logo-wordmark.svg" height="30" alt="Atlas Admin" />
    </div>
    <div class="cap">assets/logo-mark.svg · logo-wordmark.svg</div>
  </div>
  <div style="flex:1" class="dark">
    <div class="tile dark-tile">
      <img src="../assets/logo-mark.svg" width="40" height="40" alt="mark" />
      <img src="../assets/logo-wordmark.svg" height="30" alt="Atlas Admin" />
    </div>
    <div class="cap" style="color:var(--muted-foreground)">深色底 · tokens 自动适配</div>
  </div>
</body></html>
