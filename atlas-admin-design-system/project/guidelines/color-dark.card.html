<!-- @dsCard group="Colors" viewport="700x160" name="Dark Mode Surfaces" subtitle="Dark theme background, card, primary & status" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{padding:16px;font-family:var(--font-sans)}
  .dark-scope{background:var(--background);padding:14px;border-radius:var(--radius-lg)}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .sw{flex:1;min-width:96px;border-radius:var(--radius-md);border:1px solid var(--border);overflow:hidden;background:var(--card)}
  .chip{height:46px}
  .meta{padding:6px 8px}
  .name{font-size:var(--text-xs);font-weight:600;color:var(--foreground)}
  .val{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--muted-foreground);margin-top:2px}
</style></head>
<body class="dark">
  <div class="dark-scope">
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--background)"></div><div class="meta"><div class="name">background</div><div class="val">.dark</div></div></div>
      <div class="sw"><div class="chip" style="background:var(--card);border-bottom:1px solid var(--border)"></div><div class="meta"><div class="name">card</div><div class="val">.dark</div></div></div>
      <div class="sw"><div class="chip" style="background:var(--muted)"></div><div class="meta"><div class="name">muted</div><div class="val">.dark</div></div></div>
      <div class="sw"><div class="chip" style="background:var(--primary)"></div><div class="meta"><div class="name">primary</div><div class="val">.dark</div></div></div>
      <div class="sw"><div class="chip" style="background:var(--success)"></div><div class="meta"><div class="name">success</div><div class="val">.dark</div></div></div>
      <div class="sw"><div class="chip" style="background:var(--destructive)"></div><div class="meta"><div class="name">destructive</div><div class="val">.dark</div></div></div>
    </div>
  </div>
</body></html>
