<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="4px base grid — dense but breathable" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:18px;background:var(--card);font-family:var(--font-sans)}
  .r{display:flex;align-items:center;gap:12px;padding:3px 0}
  .bar{height:14px;background:var(--primary);border-radius:2px}
  .name{width:64px;font-size:var(--text-xs);font-weight:600;color:var(--foreground)}
  .val{font-family:var(--font-mono);font-size:var(--text-2xs);color:var(--muted-foreground)}
</style></head>
<body>
  <div class="r"><div class="name">space-1</div><div class="bar" style="width:var(--space-1)"></div><div class="val">4px</div></div>
  <div class="r"><div class="name">space-2</div><div class="bar" style="width:var(--space-2)"></div><div class="val">8px</div></div>
  <div class="r"><div class="name">space-3</div><div class="bar" style="width:var(--space-3)"></div><div class="val">12px · 单元格内距</div></div>
  <div class="r"><div class="name">space-4</div><div class="bar" style="width:var(--space-4)"></div><div class="val">16px · 卡片内距</div></div>
  <div class="r"><div class="name">space-6</div><div class="bar" style="width:var(--space-6)"></div><div class="val">24px · 区块间距</div></div>
  <div class="r"><div class="name">space-8</div><div class="bar" style="width:var(--space-8)"></div><div class="val">32px</div></div>
</body></html>
