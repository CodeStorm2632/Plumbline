<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../styles.css" />
  <script src="../../_ds_bundle.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; padding: 20px; background: var(--background); }
    .wrap { display: grid; grid-template-columns: 250px 1fr; gap: 18px; align-items: start; }
    .sec-label { font-family: var(--font-sans); font-size: var(--text-2xs); font-weight: 600; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--muted-foreground); margin-bottom: 8px; }

  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const NS = window.AtlasAdminDesignSystem_9d1c70;
    const { SidebarNav, Breadcrumb, Tabs } = NS;
    const I = (d) => () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none">{d}</svg>;
    const Dash = <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="9" rx="1.5" stroke="currentColor" strokeWidth="1.7"/><rect x="14" y="3" width="7" height="5" rx="1.5" stroke="currentColor" strokeWidth="1.7"/><rect x="14" y="12" width="7" height="9" rx="1.5" stroke="currentColor" strokeWidth="1.7"/><rect x="3" y="16" width="7" height="5" rx="1.5" stroke="currentColor" strokeWidth="1.7"/></svg>;
    const Shield = <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round"/></svg>;
    const Book = <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 4h11a2 2 0 012 2v14H7a2 2 0 01-2-2z" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round"/><path d="M5 18a2 2 0 012-2h11" stroke="currentColor" strokeWidth="1.7"/></svg>;
    function Demo() {
      const [active, setActive] = React.useState('users');
      const [tab, setTab] = React.useState('login');
      const groups = [
        { title: '总览', items: [{ key: 'dash', title: '仪表盘', icon: Dash, url: '#' }] },
        { title: '系统管理', items: [
          { key: 'perm', title: '权限管理', icon: Shield, defaultOpen: true, items: [
            { key: 'users', title: '用户管理', url: '#', badge: 12 },
            { key: 'roles', title: '角色管理', url: '#' },
            { key: 'menus', title: '菜单管理', url: '#' },
          ]},
          { key: 'basic', title: '基础数据', icon: Book, items: [
            { key: 'dict', title: '字典管理', url: '#' },
            { key: 'logs', title: '日志管理', url: '#' },
          ]},
        ]},
      ];
      return (
        <div className="wrap">
          <div>
            <div className="sec-label">Sidebar Nav</div>
            <div className="side"><SidebarNav groups={groups} active={active} onNavigate={setActive} /></div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:22}}>
            <div>
              <div className="sec-label">Breadcrumb</div>
              <Breadcrumb items={[{label:'系统管理',href:'#'},{label:'用户管理',href:'#'},{label:'编辑用户'}]} />
            </div>
            <div>
              <div className="sec-label">Tabs</div>
              <Tabs value={tab} onChange={setTab} tabs={[{value:'login',label:'登录日志',count:128},{value:'op',label:'操作日志',count:542},{value:'err',label:'异常日志',count:3}]} />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
