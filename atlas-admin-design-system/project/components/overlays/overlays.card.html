<!-- @dsCard group="Components" viewport="700x360" name="Overlays" subtitle="Dialog (modal) & Drawer (sheet)" -->
<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../styles.css" />
  <script src="../../_ds_bundle.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; padding: 20px; background: var(--background); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .sec-label { font-family: var(--font-sans); font-size: var(--text-2xs); font-weight: 600; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--muted-foreground); margin-bottom: 8px; }
    .hint { font-family: var(--font-sans); font-size: var(--text-sm); color: var(--muted-foreground); margin-top: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const NS = window.AtlasAdminDesignSystem_9d1c70;
    const { Dialog, Drawer, Button, FormField, Input, Select } = NS;
    function Demo() {
      const [dlg, setDlg] = React.useState(false);
      const [drw, setDrw] = React.useState(false);
      return (
        <div>
          <div className="sec-label">Overlays</div>
          <div className="row">
            <Button variant="destructive" onClick={()=>setDlg(true)}>打开确认弹窗</Button>
            <Button onClick={()=>setDrw(true)}>打开表单抽屉</Button>
          </div>
          <div className="hint">Dialog 用于确认与短表单；Drawer 用于多字段新增/编辑表单。</div>
          <Dialog open={dlg} onClose={()=>setDlg(false)} size="sm" title="删除用户"
            footer={<><Button variant="outline" onClick={()=>setDlg(false)}>取消</Button><Button variant="destructive" onClick={()=>setDlg(false)}>确认删除</Button></>}>
            确定要删除用户「张伟」吗？该操作将被记录到操作日志，且不可撤销。
          </Dialog>
          <Drawer open={drw} onClose={()=>setDrw(false)} title="新增用户" description="填写账户基础信息与角色"
            footer={<><Button variant="outline" onClick={()=>setDrw(false)}>取消</Button><Button onClick={()=>setDrw(false)}>保存</Button></>}>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <FormField label="用户名" required><Input placeholder="请输入登录账号" /></FormField>
              <FormField label="姓名" required><Input placeholder="请输入真实姓名" /></FormField>
              <FormField label="角色" required><Select placeholder="选择角色" options={[{value:'admin',label:'系统管理员'},{value:'audit',label:'审计员'}]} /></FormField>
              <FormField label="手机号" help="用于接收安全通知"><Input placeholder="选填" /></FormField>
            </div>
          </Drawer>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
