<!-- @dsCard group="Components" viewport="700x460" name="Permission Tree" subtitle="Role → menu/button permission assignment (cascade + indeterminate)" -->
<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../styles.css" />
  <script src="../../_ds_bundle.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; padding: 20px; background: var(--background); }
    .panel { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--card); padding: 10px; max-width: 460px; }
    .sec-label { font-family: var(--font-sans); font-size: var(--text-2xs); font-weight: 600; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--muted-foreground); margin-bottom: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const NS = window.AtlasAdminDesignSystem_9d1c70;
    const { PermissionTree } = NS;
    const nodes = [
      { key: 'user', label: '用户管理', code: 'system:user', children: [
        { key: 'user:list', label: '查询', code: 'system:user:list', type: 'button' },
        { key: 'user:add', label: '新增', code: 'system:user:add', type: 'button' },
        { key: 'user:edit', label: '编辑', code: 'system:user:edit', type: 'button' },
        { key: 'user:del', label: '删除', code: 'system:user:remove', type: 'button' },
      ]},
      { key: 'role', label: '角色管理', code: 'system:role', children: [
        { key: 'role:list', label: '查询', code: 'system:role:list', type: 'button' },
        { key: 'role:assign', label: '分配权限', code: 'system:role:assign', type: 'button' },
      ]},
      { key: 'log', label: '日志管理', code: 'monitor:log', children: [
        { key: 'log:login', label: '登录日志', code: 'monitor:logininfor:list', type: 'button' },
        { key: 'log:op', label: '操作日志', code: 'monitor:operlog:list', type: 'button' },
      ]},
    ];
    function Demo() {
      const [keys, setKeys] = React.useState(['user:list','user:add','role:list']);
      return (
        <div>
          <div className="sec-label">Role Permissions — 已选 {keys.length} 项</div>
          <div className="panel"><PermissionTree nodes={nodes} checkedKeys={keys} onChange={setKeys} /></div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
