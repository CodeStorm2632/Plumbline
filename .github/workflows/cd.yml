name: cd
on:
  push:
    branches: [main]          # → 自动部署 staging
    tags: ["v*"]              # → 部署 production（受环境审批门控）
  workflow_dispatch:          # 手动触发，可选环境
    inputs:
      environment:
        type: choice
        options: [staging, production]
        default: staging

permissions:
  contents: read
  packages: write             # 推送镜像到 GHCR

jobs:
  # —— 阶段一：测试门（复用 ci.yml 全部检查）——
  tests:
    uses: ./.github/workflows/ci.yml

  # —— 阶段二：构建并推送镜像 ——
  build:
    needs: tests
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else echo "tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"; fi
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/plumbline-backend:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/plumbline-backend:latest
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/plumbline-frontend:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/plumbline-frontend:latest

  # —— 阶段三：部署 staging（main 推送或手动 staging，自动放行）——
  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: SSH 部署 + 冒烟 + 失败回滚
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          TAG: ${{ needs.build.outputs.tag }}
        run: bash deploy/remote-deploy.sh

  # —— 阶段四：部署 production（打 tag 或手动 production；GH 环境审批 = 人工点确认）——
  deploy-production:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    runs-on: ubuntu-latest
    environment: production       # 在仓库 Settings→Environments 给 production 配 required reviewers
    steps:
      - uses: actions/checkout@v4
      - name: SSH 部署 + 冒烟 + 失败回滚
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          TAG: ${{ needs.build.outputs.tag }}
        run: bash deploy/remote-deploy.sh
