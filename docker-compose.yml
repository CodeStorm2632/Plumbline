services:
  # 单层 nginx 反代：/api + /health → backend，其它 → frontend。
  # 不读 docker socket，绕开 OrbStack 与 Traefik SDK 的版本协商问题。
  # 生产换 HTTPS：把 80 改 443，挂证书并加 ssl 指令；或外层挂另一台网关。
  edge:
    image: nginx:alpine
    ports: ["8090:80"]
    volumes: ["./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro"]
    depends_on: [backend, frontend]

  db:
    image: postgres:18
    ports: ["5433:5432"]
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    # PG 18 改了挂载约定：要求挂 /var/lib/postgresql（含 major-version 子目录），
    # 而不是直接挂 /var/lib/postgresql/data。详见 docker-library/postgres#1259。
    volumes: ["pgdata:/var/lib/postgresql"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redisdata:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  backend:
    build: ./backend
    # tongsuopy(国密) 仅发布 linux/amd64 wheel；锁平台以保留真实国密链路。
    # Apple Silicon 下走 Rosetta/QEMU 模拟，构建/运行较慢但安全链路不退化。
    platform: linux/amd64
    environment:
      ENV: prod
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
      REDIS_URL: redis://redis:6379/0
      SM2_PRIVATE_KEY: ${SM2_PRIVATE_KEY:-}
      SM2_PUBLIC_KEY: ${SM2_PUBLIC_KEY:-}
      SM4_KEY: ${SM4_KEY:-0123456789abcdef}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  frontend:
    # build context 抬到仓库根，让 Dockerfile 可以 COPY ../specs/contract/openapi.json
    # （orval.config.ts 用相对路径引用契约文件，本地开发与容器构建保持同一路径语义）。
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    depends_on: [backend]

volumes:
  pgdata:
  redisdata:
