# 单层 nginx 反代：/api + /health → backend；其他 → frontend SPA。
# 不读 docker socket（避免与 OrbStack 协商失败），直接走 compose 网络的服务名。
#
# 与原 Traefik 同一份路由意图：
#   - PathPrefix(`/api`) + PathPrefix(`/health`) → backend:8000
#   - 其它路径                                   → frontend:80（已含 try_files SPA 回退）
#
# resolver 127.0.0.11 是 docker compose 网络内置 DNS。把上游 host 写进变量再 proxy_pass，
# nginx 启动时不会预解析（避免 backend/frontend 启动慢导致 edge 容器 emerg 退出），
# 解析改在每次请求时按 valid=10s 走 docker DNS。

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80 default_server;
    server_name _;

    # 后端 API：/api/* 与 /health（与 specs/contract/openapi.json + main.py 的路径前缀对齐）
    location /api/ {
        set $upstream_backend "backend:8000";
        proxy_pass         http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /health {
        set $upstream_backend "backend:8000";
        proxy_pass         http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # 前端（SPA 回退已在 frontend 镜像内 nginx 配好）
    location / {
        set $upstream_frontend "frontend:80";
        proxy_pass         http://$upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
